<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multica — Open-Source Managed Agents Platform</title>
  <meta name="description" content="Turn coding agents into real teammates. Assign tasks, track progress, compound skills with Multica." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="app-shell" id="app">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-top">
        <div class="workspace-switcher" id="workspaceSwitcher">
          <div class="workspace-avatar">M</div>
          <div class="workspace-info">
            <span class="workspace-name">Multica Demo</span>
            <span class="workspace-plan">Free</span>
          </div>
          <svg class="chevron-icon" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 6L8 10L12 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <nav class="sidebar-nav">
        <ul class="nav-list">
          <li class="nav-item" data-view="inbox" id="nav-inbox">
            <a class="nav-link" href="#" id="link-inbox">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.5 12.5L5 7.5H15L17.5 12.5V15.833C17.5 16.2935 17.127 16.6667 16.6667 16.6667H3.33333C2.87298 16.6667 2.5 16.2935 2.5 15.833V12.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M2.5 12.5H7.5L8.75 14.167H11.25L12.5 12.5H17.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M10 3.333V7.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                <path d="M7.5 5L10 7.5L12.5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
              <span>Inbox</span>
              <span class="nav-badge" id="inbox-badge">3</span>
            </a>
          </li>
          <li class="nav-item" data-view="my-issues" id="nav-my-issues">
            <a class="nav-link" href="#" id="link-my-issues">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10" cy="8" r="3.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M3.5 17C3.5 14.0147 6.46243 11.667 10 11.667C13.5376 11.667 16.5 14.0147 16.5 17" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <span>My Issues</span>
            </a>
          </li>
          <li class="nav-item active" data-view="issues" id="nav-issues">
            <a class="nav-link" href="#" id="link-issues">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3.333 5H16.667M3.333 10H16.667M3.333 15H10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <span>Issues</span>
            </a>
          </li>
          <li class="nav-divider"></li>
          <li class="nav-item" data-view="agents" id="nav-agents">
            <a class="nav-link" href="#" id="link-agents">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="6" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7 6V5C7 3.895 7.895 3 9 3H11C12.105 3 13 3.895 13 5V6" stroke="currentColor" stroke-width="1.4"/>
                <circle cx="10" cy="11" r="1.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7.5 14C7.5 12.619 8.619 12 10 12C11.381 12 12.5 12.619 12.5 14" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <span>Agents</span>
            </a>
          </li>
          <li class="nav-item" data-view="runtimes" id="nav-runtimes">
            <a class="nav-link" href="#" id="link-runtimes">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="3" width="14" height="14" rx="2" stroke="currentColor" stroke-width="1.4"/>
                <path d="M7 7L9 9L7 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M10.5 13H13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <span>Runtimes</span>
            </a>
          </li>
          <li class="nav-item" data-view="skills" id="nav-skills">
            <a class="nav-link" href="#" id="link-skills">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 2L12.09 7.26L17.81 7.64L13.64 11.26L14.99 17L10 14L5.01 17L6.36 11.26L2.19 7.64L7.91 7.26L10 2Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
              </svg>
              <span>Skills</span>
            </a>
          </li>
          <li class="nav-item" data-view="settings" id="nav-settings">
            <a class="nav-link" href="#" id="link-settings">
              <svg class="nav-icon" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M10 2.5V4.167M10 15.833V17.5M17.5 10H15.833M4.167 10H2.5M15.303 4.697L14.142 5.858M5.858 14.142L4.697 15.303M15.303 15.303L14.142 14.142M5.858 5.858L4.697 4.697" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
              <span>Settings</span>
            </a>
          </li>
        </ul>
      </nav>

      <div class="sidebar-footer">
        <button class="profile-btn" id="profileBtn">
          <div class="profile-avatar">U</div>
          <div class="profile-info">
            <span class="profile-name">Umang Yadav</span>
          </div>
        </button>
        <button class="help-btn" id="helpBtn" title="Help">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="10" cy="10" r="7.5" stroke="currentColor" stroke-width="1.4"/>
            <path d="M10 13.5V13.333" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            <path d="M10 11C10 9.667 11.5 9.333 11.5 8C11.5 7.172 10.828 6.5 10 6.5C9.172 6.5 8.5 7.172 8.5 8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content" id="mainContent">

      <!-- VIEW: ISSUES (Board) -->
      <div class="view" id="view-issues">
        <div class="view-header">
          <div class="view-breadcrumb">
            <span class="breadcrumb-workspace">Multica Demo</span>
            <svg class="breadcrumb-arrow" viewBox="0 0 16 16" fill="none">
              <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="breadcrumb-current">Issues</span>
          </div>
          <div class="view-actions">
            <span class="issues-count" id="issuesCount">21 Issues</span>
            <div class="view-toggle">
              <button class="view-btn active" id="boardViewBtn" title="Board View">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="1" y="1" width="5" height="14" rx="1" stroke="currentColor" stroke-width="1.4"/>
                  <rect x="9.5" y="1" width="5.5" height="14" rx="1" stroke="currentColor" stroke-width="1.4"/>
                </svg>
              </button>
              <button class="view-btn" id="listViewBtn" title="List View">
                <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M2 4H14M2 8H14M2 12H10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
                </svg>
              </button>
            </div>
            <button class="btn-primary" id="newIssueBtn">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 2V14M2 8H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              New Issue
            </button>
          </div>
        </div>

        <!-- BOARD VIEW -->
        <div class="board-container" id="boardContainer">
          <!-- columns injected by JS -->
        </div>

        <!-- LIST VIEW (hidden initially) -->
        <div class="list-container hidden" id="listContainer">
          <!-- list items rendered by JS -->
        </div>
      </div>

      <!-- VIEW: AGENTS -->
      <div class="view hidden" id="view-agents">
        <div class="view-header">
          <div class="view-breadcrumb">
            <span class="breadcrumb-workspace">Multica Demo</span>
            <svg class="breadcrumb-arrow" viewBox="0 0 16 16" fill="none">
              <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="breadcrumb-current">Agents</span>
          </div>
          <div class="view-actions">
            <button class="btn-primary" id="newAgentBtn">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 2V14M2 8H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              New Agent
            </button>
          </div>
        </div>
        <div class="agents-grid" id="agentsGrid">
          <!-- injected by JS -->
        </div>
      </div>

      <!-- VIEW: RUNTIMES -->
      <div class="view hidden" id="view-runtimes">
        <div class="view-header">
          <div class="view-breadcrumb">
            <span class="breadcrumb-workspace">Multica Demo</span>
            <svg class="breadcrumb-arrow" viewBox="0 0 16 16" fill="none">
              <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="breadcrumb-current">Runtimes</span>
          </div>
          <div class="view-actions">
            <button class="btn-primary" id="newRuntimeBtn">
              <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 2V14M2 8H14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              </svg>
              Connect Runtime
            </button>
          </div>
        </div>
        <div class="runtimes-list" id="runtimesList">
          <!-- injected by JS -->
        </div>
      </div>

      <!-- VIEW: SKILLS -->
      <div class="view hidden" id="view-skills">
        <div class="view-header">
          <div class="view-breadcrumb">
            <span class="breadcrumb-workspace">Multica Demo</span>
            <svg class="breadcrumb-arrow" viewBox="0 0 16 16" fill="none">
              <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="breadcrumb-current">Skills</span>
          </div>
        </div>
        <div class="skills-grid" id="skillsGrid">
          <!-- injected by JS -->
        </div>
      </div>

      <!-- VIEW: INBOX -->
      <div class="view hidden" id="view-inbox">
        <div class="view-header">
          <div class="view-breadcrumb">
            <span class="breadcrumb-current">Inbox</span>
          </div>
        </div>
        <div class="inbox-list" id="inboxList">
          <!-- injected by JS -->
        </div>
      </div>

      <!-- VIEW: MY ISSUES -->
      <div class="view hidden" id="view-my-issues">
        <div class="view-header">
          <div class="view-breadcrumb">
            <span class="breadcrumb-current">My Issues</span>
          </div>
        </div>
        <div class="my-issues-list" id="myIssuesList">
          <!-- injected by JS -->
        </div>
      </div>

      <!-- VIEW: SETTINGS -->
      <div class="view hidden" id="view-settings">
        <div class="view-header">
          <div class="view-breadcrumb">
            <span class="breadcrumb-workspace">Multica Demo</span>
            <svg class="breadcrumb-arrow" viewBox="0 0 16 16" fill="none">
              <path d="M6 4L10 8L6 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span class="breadcrumb-current">Settings</span>
          </div>
        </div>
        <div class="settings-layout" id="settingsLayout">
          <!-- injected by JS -->
        </div>
      </div>
    </main>
  </div>

  <!-- NEW ISSUE MODAL -->
  <div class="modal-overlay hidden" id="newIssueModal">
    <div class="modal" id="newIssueModalContent">
      <div class="modal-header">
        <h2 class="modal-title">New Issue</h2>
        <button class="modal-close" id="closeIssueModal">
          <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3 3L13 13M13 3L3 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <input type="text" class="modal-input" id="issueTitle" placeholder="Issue title" />
        <textarea class="modal-textarea" id="issueDesc" placeholder="Add description…" rows="3"></textarea>
        <div class="modal-meta">
          <div class="meta-field">
            <label class="meta-label">Status</label>
            <select class="meta-select" id="issueStatus">
              <option value="backlog">Backlog</option>
              <option value="todo">Todo</option>
              <option value="in-progress">In Progress</option>
              <option value="in-review">In Review</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="meta-field">
            <label class="meta-label">Priority</label>
            <select class="meta-select" id="issuePriority">
              <option value="urgent">Urgent</option>
              <option value="high">High</option>
              <option value="medium" selected>Medium</option>
              <option value="low">Low</option>
            </select>
          </div>
          <div class="meta-field">
            <label class="meta-label">Assignee</label>
            <select class="meta-select" id="issueAssignee">
              <option value="human">Umang Yadav</option>
              <option value="agent-claude">Claude Agent</option>
              <option value="agent-codex">Codex Agent</option>
              <option value="agent-openclaw">OpenClaw Agent</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" id="cancelIssueBtn">Cancel</button>
        <button class="btn-primary" id="saveIssueBtn">Create Issue</button>
      </div>
    </div>
  </div>

  <!-- ISSUE DETAIL PANEL -->
  <div class="detail-panel hidden" id="issueDetailPanel">
    <div class="detail-header">
      <button class="detail-close" id="closeDetailPanel">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M13 3L3 13M3 3L13 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
    <div class="detail-body" id="detailBody">
      <!-- injected by JS -->
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast hidden" id="toast">
    <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1.4"/>
      <path d="M5 8L7 10L11 6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span id="toastMsg">Issue created</span>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
